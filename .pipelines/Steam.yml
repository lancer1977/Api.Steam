name: 1.0.2.$(rev:r)

variables:
- name: Project.Path
  value: '**/PolyhydraGames.Api.Steam.csproj'
- name: BuildConfiguration
  value: Release

trigger:
  branches:
    include:
    - refs/heads/main
  paths:
    include:
    - Api.Steam

jobs:
- job: Phase_1
  cancelTimeoutInMinutes: 1
  pool:
    name: Default
  steps:
  - checkout: self

  - task: Bash@3
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        sed -i "s|%GITHUB_TOKEN%|$(NugetPat)|" NuGet.Config
        dotnet restore PolyhydraGames.Api.Steam.sln

  - task: Bash@3
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        dotnet pack "$(Project.Path)" \
          -c "$(BuildConfiguration)" \
          --no-restore \
          --output "$(Build.ArtifactStagingDirectory)" \
          /p:PackageVersion="$(Build.BuildNumber)"

  - task: Bash@3
    inputs:
      targetType: inline
      script: |
        set -euo pipefail
        for package in "$(Build.ArtifactStagingDirectory)"/*.nupkg; do
          dotnet nuget push "$package" \
            --source "https://nuget.pkg.github.com/lancer1977/index.json" \
            --api-key "$(NugetPat)" \
            --skip-duplicate
        done
