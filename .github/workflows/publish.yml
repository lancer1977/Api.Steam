name: publish

on:
  push:
    branches: [ main ]
    paths:
      - "Api.Steam/**"
      - "Api.Steam.Test/**"
      - "README.md"
      - "docs/**"
      - ".github/workflows/publish.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-test-pack-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore PolyhydraGames.Api.Steam.sln

      - name: Build
        run: dotnet build PolyhydraGames.Api.Steam.sln -c Release --no-restore

      - name: Test
        run: dotnet test PolyhydraGames.Api.Steam.sln -c Release --no-build

      - name: Compute package version
        shell: bash
        run: echo "PACKAGE_VERSION=1.0.2.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Pack
        run: dotnet pack Api.Steam/PolyhydraGames.Api.Steam.csproj -c Release --no-build -p:PackageVersion=${PACKAGE_VERSION} -o artifacts/packages

      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dotnet nuget push "artifacts/packages/*.nupkg" --api-key "$GITHUB_TOKEN" --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
